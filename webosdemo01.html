<!DOCTYPE html><html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Web OS</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(120deg, #4facfe, #00f2fe);
      overflow: hidden;
    }
    .taskbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 40px;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      color: white;
      box-sizing: border-box;
    }
    .task-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .task-right {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 14px;
    }
    .start {
      cursor: pointer;
    }
    .window {
      position: absolute;
      width: 500px;
      height: 300px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .titlebar {
      background: #333;
      color: white;
      padding: 5px;
      cursor: move;
      display: flex;
      justify-content: space-between;
    }
    .content {
      padding: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .close {
      cursor: pointer;
    }
    .menu {
      position: fixed;
      bottom: 40px;
      left: 10px;
      background: white;
      border-radius: 6px;
      display: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .menu div {
      padding: 10px;
      cursor: pointer;
    }
    .menu div:hover {
      background: #eee;
    }
    .browser-bar {
      display: flex;
      border-bottom: 1px solid #ccc;
    }
    .browser-bar input {
      flex: 1;
      padding: 5px;
      border: none;
      outline: none;
    }
    .browser-bar button {
      padding: 5px 10px;
      border: none;
      background: #4facfe;
      color: white;
      cursor: pointer;
    }
    iframe {
      flex: 1;
      border: none;
    }
  </style>
</head>
<body><div class="taskbar">
  <div class="task-left">
    <div class="start" onclick="toggleMenu()">スタート</div>
  </div>
  <div class="task-right">
    <div id="battery">🔋--%</div>
    <div id="clock">--:--</div>
  </div>
</div><div class="menu" id="menu">
  <div onclick="openMemo()">メモ帳</div>
  <div onclick="openBrowser()">ブラウザ</div>
</div><script>
  function toggleMenu() {
    const menu = document.getElementById('menu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  }

  function createWindow(title) {
    const win = document.createElement('div');
    win.className = 'window';
    win.style.top = Math.random()*300 + 'px';
    win.style.left = Math.random()*500 + 'px';

    win.innerHTML = `
      <div class="titlebar">
        <span>${title}</span>
        <span class="close" onclick="this.parentElement.parentElement.remove()">×</span>
      </div>
      <div class="content"></div>
    `;

    document.body.appendChild(win);
    dragElement(win);
    return win.querySelector('.content');
  }

  function openMemo() {
    const content = createWindow('メモ帳');

    const textarea = document.createElement('textarea');
    textarea.style.width = '100%';
    textarea.style.height = '100%';
    textarea.style.boxSizing = 'border-box';

    // 保存された内容を読み込み
    textarea.value = localStorage.getItem('memo_content') || '';

    // 入力時に自動保存
    textarea.addEventListener('input', () => {
      localStorage.setItem('memo_content', textarea.value);
    });

    content.appendChild(textarea);
  }

  function openBrowser() {
    const content = createWindow('ブラウザ');

    const bar = document.createElement('div');
    bar.className = 'browser-bar';

    const input = document.createElement('input');
    input.placeholder = 'https://example.com';

    const button = document.createElement('button');
    button.textContent = '移動';

    const iframe = document.createElement('iframe');

    button.onclick = () => {
      let url = input.value;
      if (!url.startsWith('http')) {
        url = 'https://' + url;
      }
      iframe.src = url;
    };

    bar.appendChild(input);
    bar.appendChild(button);

    content.appendChild(bar);
    content.appendChild(iframe);
  }

  function dragElement(el) {
    const title = el.querySelector('.titlebar');
    let offsetX = 0, offsetY = 0, isDown = false;

    title.addEventListener('mousedown', (e) => {
      isDown = true;
      offsetX = e.clientX - el.offsetLeft;
      offsetY = e.clientY - el.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
      if (isDown) {
        el.style.left = (e.clientX - offsetX) + 'px';
        el.style.top = (e.clientY - offsetY) + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      isDown = false;
    });
  }

  // 時計
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // バッテリー（対応ブラウザのみ）
  if (navigator.getBattery) {
    navigator.getBattery().then(battery => {
      function updateBattery() {
        const level = Math.round(battery.level * 100);
        const icon = battery.charging ? '⚡🔋' : '🔋';
        document.getElementById('battery').textContent = `${icon}${level}%`;
      }
      updateBattery();
      battery.addEventListener('levelchange', updateBattery);
      battery.addEventListener('chargingchange', updateBattery);
    });
  } else {
    document.getElementById('battery').textContent = '🔋N/A';
  }
</script></body>
        </html>
